name: Refresh Ember Data

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Write environment file
        run: |
          cat <<'EOF' > .env
          EMBER_API_KEY=${{ secrets.EMBER_API_KEY }}
          EOF

      - name: Refresh Ember dataset
        run: node ./scripts/fetch-ember-monthly.mjs

      - name: Remove temporary environment file
        run: rm -f .env

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ember-monthly-series.json data/ember-monthly-emissions-series.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Refresh Ember monthly data"
          git push
